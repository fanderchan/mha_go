name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build binaries
        run: |
          mkdir -p dist

          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w -X main.version=${GITHUB_REF_NAME} -extldflags=-static" \
            -o "dist/mha_${GITHUB_REF_NAME}_linux_amd64" ./cmd/mha

          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -ldflags="-s -w -X main.version=${GITHUB_REF_NAME} -extldflags=-static" \
            -o "dist/mha_${GITHUB_REF_NAME}_linux_arm64" ./cmd/mha

          (cd dist && sha256sum * > SHA256SUMS)

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
