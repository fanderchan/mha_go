# Starter config for a MySQL 8.4 GTID single-primary cluster.
#
# Copy this file to /etc/mha/cluster.yaml and replace the node addresses,
# users, and credential references. Keep this starter small; optional VIP/proxy
# switching, fencing, hooks, and SSH binlog salvage are documented in:
#
#   examples/cluster-8.4.full.yaml
#   docs/operations.md

# Cluster name used in logs, leases, and hook environment variables.
name: app1

# v1 supports mysql-replication-single-primary only. This means ordinary MySQL single-primary
# replication, and it includes both pure async and semi-sync deployments. Enable
# semi-sync checks separately under replication.semi_sync.
topology:
  kind: mysql-replication-single-primary

replication:
  # Only GTID replication is supported.
  mode: gtid

  # Use preferred/required only after MySQL semi-sync is installed and enabled.
  # disabled is the least surprising starter value for a pure async cluster.
  semi_sync:
    policy: disabled

  # Conservative default: try to recover missing GTIDs and abort if recovery
  # fails. Configure per-node ssh blocks from cluster-8.4.full.yaml if you need
  # old-primary binlog salvage when the old primary is SQL-dead.
  salvage:
    policy: salvage-if-possible
    timeout: 30s

# No VIP/proxy movement in the starter config. Use the full example when the
# application writes through a movable VIP or proxy writer endpoint.
writer_endpoint:
  kind: none

nodes:
  - id: db1
    host: 10.0.0.11
    port: 3306
    version_series: "8.4"
    expected_role: primary
    sql:
      user: mha
      # Use env: or file: in production. Avoid plain: secrets outside tests.
      password_ref: env:MHA_ADMIN_PASSWORD
      # Account used by CHANGE REPLICATION SOURCE TO after promote/repoint.
      replication_user: repl
      replication_password_ref: env:MHA_REPL_PASSWORD

  - id: db2
    host: 10.0.0.12
    port: 3306
    version_series: "8.4"
    expected_role: replica
    # Higher values are preferred when mha-go auto-selects a new primary.
    candidate_priority: 100
    sql:
      user: mha
      password_ref: env:MHA_ADMIN_PASSWORD
      replication_user: repl
      replication_password_ref: env:MHA_REPL_PASSWORD

  - id: db3
    host: 10.0.0.13
    port: 3306
    version_series: "8.4"
    expected_role: replica
    candidate_priority: 90
    sql:
      user: mha
      password_ref: env:MHA_ADMIN_PASSWORD
      replication_user: repl
      replication_password_ref: env:MHA_REPL_PASSWORD
